naftiko: 1.0.0-alpha2
info:
  label: UPS Shipping API — Address Validation
  description: 'UPS Shipping API — Address Validation. 1 operations. Lead operation: Validate Address Street Level. Self-contained
    Naftiko capability covering one Ups business surface.'
  tags:
  - Ups
  - Address Validation
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UPS_API_KEY: UPS_API_KEY
capability:
  consumes:
  - type: http
    namespace: shipping-address-validation
    baseUri: https://onlinetools.ups.com/api
    description: UPS Shipping API — Address Validation business capability. Self-contained, no shared references.
    resources:
    - name: addressvalidation-v1-1
      path: /addressvalidation/v1/1
      operations:
      - name: validateaddressstreetlevel
        method: POST
        description: Validate Address Street Level
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.UPS_API_KEY}}'
  exposes:
  - type: rest
    namespace: shipping-address-validation-rest
    port: 8080
    description: REST adapter for UPS Shipping API — Address Validation. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/addressvalidation/v1/1
      name: addressvalidation-v1-1
      description: REST surface for addressvalidation-v1-1.
      operations:
      - method: POST
        name: validateaddressstreetlevel
        description: Validate Address Street Level
        call: shipping-address-validation.validateaddressstreetlevel
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: shipping-address-validation-mcp
    port: 9090
    transport: http
    description: MCP adapter for UPS Shipping API — Address Validation. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: validate-address-street-level
      description: Validate Address Street Level
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: shipping-address-validation.validateaddressstreetlevel
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
