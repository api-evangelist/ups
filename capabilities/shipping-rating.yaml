naftiko: 1.0.0-alpha2
info:
  label: UPS Shipping API — Rating
  description: 'UPS Shipping API — Rating. 2 operations. Lead operation: Get Rate. Self-contained Naftiko capability covering
    one Ups business surface.'
  tags:
  - Ups
  - Rating
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UPS_API_KEY: UPS_API_KEY
capability:
  consumes:
  - type: http
    namespace: shipping-rating
    baseUri: https://onlinetools.ups.com/api
    description: UPS Shipping API — Rating business capability. Self-contained, no shared references.
    resources:
    - name: rating-v1-Rate
      path: /rating/v1/Rate
      operations:
      - name: getrate
        method: POST
        description: Get Rate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: rating-v1-Shop
      path: /rating/v1/Shop
      operations:
      - name: shoprates
        method: POST
        description: Shop Rates
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.UPS_API_KEY}}'
  exposes:
  - type: rest
    namespace: shipping-rating-rest
    port: 8080
    description: REST adapter for UPS Shipping API — Rating. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/rating/v1/rate
      name: rating-v1-rate
      description: REST surface for rating-v1-Rate.
      operations:
      - method: POST
        name: getrate
        description: Get Rate
        call: shipping-rating.getrate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/rating/v1/shop
      name: rating-v1-shop
      description: REST surface for rating-v1-Shop.
      operations:
      - method: POST
        name: shoprates
        description: Shop Rates
        call: shipping-rating.shoprates
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: shipping-rating-mcp
    port: 9090
    transport: http
    description: MCP adapter for UPS Shipping API — Rating. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-rate
      description: Get Rate
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: shipping-rating.getrate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: shop-rates
      description: Shop Rates
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: shipping-rating.shoprates
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
