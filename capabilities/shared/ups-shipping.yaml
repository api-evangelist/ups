naftiko: "1.0.0-alpha1"

info:
  label: "UPS Shipping API"
  description: >-
    UPS Shipping API shared capability definition covering OAuth authentication,
    shipping rate shopping, shipment creation and label generation, package
    tracking, address validation, pickup scheduling, and time-in-transit queries.
  tags:
    - UPS
    - Shipping
    - Logistics
    - Tracking
    - Rating
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      UPS_CLIENT_ID: UPS_CLIENT_ID
      UPS_CLIENT_SECRET: UPS_CLIENT_SECRET
      UPS_ACCOUNT_NUMBER: UPS_ACCOUNT_NUMBER

capability:
  consumes:
    - type: http
      namespace: ups-shipping
      baseUri: https://onlinetools.ups.com/api
      description: "UPS REST API for shipping, tracking, and logistics"
      authentication:
        type: bearer
        token: "{{UPS_ACCESS_TOKEN}}"
      resources:
        - name: rates
          path: /rating/v1/Shop
          description: "Rate shopping across all UPS services"
          operations:
            - name: shop-rates
              method: POST
              description: "Get rates for all UPS services for a shipment"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  RateRequest:
                    Shipment:
                      Shipper:
                        ShipperNumber: "{{tools.accountNumber}}"
                        Address:
                          AddressLine: ["{{tools.originAddress}}"]
                          City: "{{tools.originCity}}"
                          StateProvinceCode: "{{tools.originState}}"
                          PostalCode: "{{tools.originPostalCode}}"
                          CountryCode: "{{tools.originCountryCode}}"
                      ShipTo:
                        Address:
                          AddressLine: ["{{tools.destAddress}}"]
                          City: "{{tools.destCity}}"
                          StateProvinceCode: "{{tools.destState}}"
                          PostalCode: "{{tools.destPostalCode}}"
                          CountryCode: "{{tools.destCountryCode}}"
                      Package:
                        PackageWeight:
                          UnitOfMeasurement:
                            Code: "LBS"
                          Weight: "{{tools.weightLbs}}"

        - name: rate
          path: /rating/v1/Rate
          description: "Get rate for a specific UPS service"
          operations:
            - name: get-rate
              method: POST
              description: "Get rate for a specific service"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  RateRequest:
                    Shipment:
                      Service:
                        Code: "{{tools.serviceCode}}"

        - name: shipments
          path: /shipments/v1/ship
          description: "Shipment creation and label generation"
          operations:
            - name: create-shipment
              method: POST
              description: "Create shipment and generate label"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  ShipmentRequest:
                    Shipment:
                      Shipper:
                        ShipperNumber: "{{tools.accountNumber}}"
                      Service:
                        Code: "{{tools.serviceCode}}"

        - name: void-shipment
          path: /shipments/v1/void/cancel/{shipmentIdentificationNumber}
          description: "Void a shipment"
          operations:
            - name: void-shipment
              method: DELETE
              description: "Cancel/void a shipment by tracking number"
              inputParameters:
                - name: shipmentIdentificationNumber
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: tracking
          path: /track/v1/details/{inquiryNumber}
          description: "Package tracking"
          operations:
            - name: track-shipment
              method: GET
              description: "Track a package by tracking number"
              inputParameters:
                - name: inquiryNumber
                  in: path
                  type: string
                  required: true
                  description: "UPS tracking number"
                - name: locale
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: address-validation
          path: /addressvalidation/v1/1
          description: "Address validation and classification"
          operations:
            - name: validate-address
              method: POST
              description: "Validate and classify a shipping address"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  AddressValidationRequest:
                    AddressKeyFormat:
                      AddressLine: ["{{tools.addressLine}}"]
                      PoliticalDivision2: "{{tools.city}}"
                      PoliticalDivision1: "{{tools.state}}"
                      PostcodePrimaryLow: "{{tools.postalCode}}"
                      CountryCode: "{{tools.countryCode}}"

        - name: pickups
          path: /pickup/v1/pickups
          description: "Pickup scheduling"
          operations:
            - name: schedule-pickup
              method: POST
              description: "Schedule a UPS pickup"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  PickupCreationRequest:
                    PickupDateInfo:
                      PickupDate: "{{tools.pickupDate}}"
                      ReadyTime: "{{tools.readyTime}}"
                      CloseTime: "{{tools.closeTime}}"

        - name: time-in-transit
          path: /timeintransit/v1/transittimes
          description: "Transit time estimates"
          operations:
            - name: get-time-in-transit
              method: POST
              description: "Get transit time estimates by service"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  originCountryCode: "{{tools.originCountryCode}}"
                  originPostalCode: "{{tools.originPostalCode}}"
                  destinationCountryCode: "{{tools.destCountryCode}}"
                  destinationPostalCode: "{{tools.destPostalCode}}"
                  weight: "{{tools.weightLbs}}"
                  weightUnitOfMeasure: "LBS"
                  shipDate: "{{tools.shipDate}}"

  exposes:
    - type: rest
      port: 8100
      namespace: ups-shipping-api
      resources:
        - path: /v1/rates
          name: rates
          operations:
            - method: POST
              name: shop-rates
              description: "Get rates for all UPS services"
              call: "ups-shipping.shop-rates"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/tracking/{inquiryNumber}
          name: tracking
          operations:
            - method: GET
              name: track-shipment
              description: "Track a package"
              call: "ups-shipping.track-shipment"
              with:
                inquiryNumber: "rest.inquiryNumber"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: ups-shipping-mcp
      transport: http
      tools:
        - name: shop-rates
          description: "Get rates for all available UPS shipping services"
          hints:
            readOnly: true
            openWorld: true
          call: "ups-shipping.shop-rates"
          outputParameters:
            - type: object
              mapping: "$."
        - name: track-shipment
          description: "Track a UPS package by tracking number"
          hints:
            readOnly: true
            openWorld: true
          call: "ups-shipping.track-shipment"
          with:
            inquiryNumber: "tools.inquiryNumber"
          outputParameters:
            - type: object
              mapping: "$."
        - name: validate-address
          description: "Validate and classify a shipping address as residential or commercial"
          hints:
            readOnly: true
            openWorld: true
          call: "ups-shipping.validate-address"
          outputParameters:
            - type: object
              mapping: "$."
