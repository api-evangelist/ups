  address: Address!
}

# ─────────────────────────────────────────────
# Service
# ─────────────────────────────────────────────

"""UPS service code."""
type ServiceCode {
  code: ServiceTypeCode!
  description: String
}

"""Human-readable service description."""
type ServiceDescription {
  code: String!
  description: String!
}

"""Service availability for an origin/destination pair."""
type ServiceAvailability {
