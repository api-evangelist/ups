"""
UPS GraphQL Schema
Provider: UPS (United Parcel Service)
Source: UPS Developer Kit REST API (https://developer.ups.com/)
GitHub: https://github.com/UPS-API
Base URL: https://onlinetools.ups.com/api
Auth: OAuth 2.0 (client credentials / authorization code)
"""

# ─────────────────────────────────────────────
# Scalars
# ─────────────────────────────────────────────

scalar DateTime
scalar Date
scalar JSON

# ─────────────────────────────────────────────
# Enums
# ─────────────────────────────────────────────

enum WeightUnit {
  LBS
  KGS
  OZS
}

enum DimensionUnit {
  IN
  CM
}

enum LabelFormatCode {
  GIF
  HTML
  EPL
  ZPL
  SPL
  STARPL
}

enum LabelMethodCode {
  PRINT
  ELECTRONIC_RETURN_LABEL
  PRINT_AND_MAIL
  NONE
}

enum SignatureTypeCode {
  NO_SIGNATURE_REQUIRED
  SIGNATURE_REQUIRED
  ADULT_SIGNATURE_REQUIRED
  DIRECT_DELIVERY_ONLY
}

enum CODPaymentTypeCode {
  CHECK
  MONEY_ORDER
  CASHIER_CHECK
}

enum TrackingStatusType {
  IN_TRANSIT
  DELIVERED
  EXCEPTION
  PICKUP
  MANIFEST_PICKUP
  OUT_FOR_DELIVERY
  DEPARTURE_SCAN
  ARRIVAL_SCAN
  DESTINATION_SCAN
  EXPORT_SCAN
  IMPORT_SCAN
}

enum ReturnServiceCode {
  RS1   # UPS Print Return Label
  RS3   # UPS Print and Mail Return Label
  RS4   # UPS Electronic Return Label
  RS8   # UPS Returns Exchange
  RS9   # UPS Returns Pack and Collect
}

enum SurchargeTypeCode {
  RESIDENTIAL_ADDRESS
  DELIVERY_AREA
  EXTENDED_DELIVERY_AREA
  FUEL
  ADDITIONAL_HANDLING
  PEAK
  LARGE_PACKAGE
  OVERSIZE
  ADDRESS_CORRECTION
  SATURDAY_DELIVERY
  SATURDAY_PICKUP
  HAZARDOUS_MATERIALS
}

enum ServiceTypeCode {
  S01  # UPS Next Day Air
  S02  # UPS 2nd Day Air
  S03  # UPS Ground
  S07  # UPS Worldwide Express
  S08  # UPS Worldwide Expedited
  S11  # UPS Standard
  S12  # UPS 3 Day Select
  S13  # UPS Next Day Air Saver
  S14  # UPS Next Day Air Early
  S54  # UPS Worldwide Express Plus
  S59  # UPS 2nd Day Air A.M.
  S65  # UPS Worldwide Saver
  S96  # UPS Worldwide Express Freight
}

enum PackagingTypeCode {
  PT00  # Unknown
  PT01  # UPS Letter
  PT02  # Customer Supplied Package
  PT03  # Tube
  PT04  # PAK
  PT21  # UPS Express Box
  PT24  # UPS 25KG Box
  PT25  # UPS 10KG Box
  PT30  # Pallet
  PT2A  # Small Express Box
  PT2B  # Medium Express Box
  PT2C  # Large Express Box
}

enum QVSubscriptionFileType {
  MANIFEST
  DELIVERY
  EXCEPTION
  ORIGIN
  RETURN
  FREIGHT
}

# ─────────────────────────────────────────────
# General / Shared Types
# ─────────────────────────────────────────────

"""A monetary value with currency."""
type Money {
  currencyCode: String!
  monetaryValue: Float!
}

"""Physical weight."""
type Weight {
  unitOfMeasurement: WeightUnit!
  weight: Float!
}

"""Physical dimensions."""
type Dimensions {
  unitOfMeasurement: DimensionUnit!
  length: Float!
  width: Float!
  height: Float!
}

"""A generic key-value indicator."""
type IndicatorType {
  code: String
  description: String
}

"""A generic reference number attached to a shipment or package."""
type ReferenceNumber {
  value: String!
  barCodeIndicator: String
}

# ─────────────────────────────────────────────
# Address & Contact
# ─────────────────────────────────────────────

"""A postal address."""
type Address {
  addressLine1: String
  addressLine2: String
  addressLine3: String
  city: String
  stateProvinceCode: String
  postalCode: String
  countryCode: String!
  residentialAddressIndicator: Boolean
}

"""A contact person or company."""
type Contact {
  companyName: String
  attentionName: String
  taxIdentificationNumber: String
  phone: Phone
  faxNumber: String
  emailAddress: String
}

"""A phone number."""
type Phone {
  number: String!
  extension: String
}

# ─────────────────────────────────────────────
# Shipping Origin & Destination
# ─────────────────────────────────────────────

"""Ship-from (origin) address."""
type ShipFrom {
  name: String!
  attentionName: String
  taxIdentificationNumber: String
  phone: Phone
  faxNumber: String
  emailAddress: String
  address: Address!
}

"""Ship-to (destination) address."""
type ShipTo {
