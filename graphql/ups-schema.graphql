}

"""Declared insured value."""
type InsuredValue {
  currencyCode: String!
  monetaryValue: Float!
}

"""Cash on delivery option."""
type COD {
  codFundsCode: String
  codAmount: CODValue!
}

"""COD amount and currency."""
type CODValue {
  currencyCode: String!
  monetaryValue: Float!
}

"""COD payment method type."""
type CODPaymentType {
  code: CODPaymentTypeCode!
  description: String
}

# ─────────────────────────────────────────────
# Labels
# ─────────────────────────────────────────────

"""Label format specification."""
type LabelFormat {
