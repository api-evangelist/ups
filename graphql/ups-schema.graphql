}

# ─────────────────────────────────────────────
# Package
# ─────────────────────────────────────────────

"""A single package within a shipment."""
type Package {
  trackingNumber: String
  packaging: PackagingType
  weight: PackageWeight!
  dimensions: PackageDimensions
  referenceNumbers: [PackageReferenceNumber]
  deliveryConfirmation: DeliveryConfirmation
  insurance: Insurance
  cod: COD
  description: String
  largePackageIndicator: Boolean
  additionalHandlingIndicator: Boolean
  hazMatIndicator: Boolean
}

"""Extended package attributes."""
type PackageDetails {
  package: Package!
  serviceOptions: [IndicatorType]
  accessPointCOD: CODValue
  packageServiceOptions: JSON
}

"""Per-package result from shipment API."""
type PackageResult {
  trackingNumber: String!
  label: Label!
  cod: CODValue
  baseServiceCharge: Money
  serviceOptionsCharges: Money
  totalCharges: Money
  billingWeight: PackageWeight
}

# ─────────────────────────────────────────────
# Shipment
# ─────────────────────────────────────────────

"""Top-level shipment record."""
type Shipment {
  shipmentIdentificationNumber: String!
  shipper: ShipFrom!
  shipTo: ShipTo!
  shipFrom: ShipFrom
  service: ServiceCode!
  packages: [Package!]!
  paymentInformation: JSON
  shipmentTotalWeight: Weight
  description: String
  referenceNumber: ReferenceNumber
  returnService: ReturnService
  labelSpec: LabelSpec
  scheduledDeliveryDate: Date
  pickupType: IndicatorType
  shipmentServiceOptions: JSON
  createdAt: DateTime
}

"""Detailed shipment attributes."""
type ShipmentDetails {
  shipment: Shipment!
  shipmentCharges: Money
  negotiatedRateCharges: NegotiatedRate
  fapIndicator: Boolean
  ratedShipmentAlerts: [String]
}

"""Input for creating a shipment."""
input ShipmentRequest {
  shipper: ShipFromInput!
  shipTo: ShipToInput!
  shipFrom: ShipFromInput
  service: String!
  packages: [PackageInput!]!
  paymentInformation: JSON
  description: String
  referenceNumber: String
  labelSpec: LabelSpecInput
  returnService: ReturnServiceInput
  shipmentServiceOptions: JSON
}

"""Response after shipment creation."""
type ShipmentResponse {
  shipmentIdentificationNumber: String!
  packageResults: [PackageResult!]!
  shipmentCharges: Money
  negotiatedRateCharges: NegotiatedRate
  billingWeight: Weight
  estimatedDeliveryDate: Date
  alerts: [String]
}

"""Void/cancel a shipment."""
type VoidShipment {
  shipmentIdentificationNumber: String!
  status: String!
  statusDescription: String
  voidedPackages: [String]
}

