# ─────────────────────────────────────────────
# Root Operations
# ─────────────────────────────────────────────

type Query {
  """Track a package by tracking number."""
  trackPackage(trackingNumber: String!, locale: String, returnSignature: Boolean): TrackingResponse

  """Get rate quotes for a shipment."""
  getRate(request: RateRequest!): RateResponse

  """Validate a postal address."""
  validateAddress(address: AddressInput!): AddressValidation

  """Find nearby UPS locations (drop-off, access points, service centers)."""
  findLocations(request: LocatorRequest!): LocatorResponse

  """Get estimated time in transit for a shipment."""
  getTimeInTransit(shipFrom: AddressInput!, shipTo: AddressInput!, weight: WeightInput!, serviceDate: Date): [TimeInTransit]

  """Recover a previously generated shipping label."""
  getLabelRecovery(trackingNumber: String!, labelFormat: LabelFormatCode): LabelRecovery

  """Check service availability for an origin/destination pair."""
  getServiceAvailability(origin: AddressInput!, destination: AddressInput!): [ServiceAvailability]

  """Retrieve QuantumView data feed shipments."""
  getQuantumView(subscriptionName: String!, beginDate: Date, endDate: Date): [QVShipment]

  """Find UPS drop-off locations near an address."""
  getDropLocations(address: AddressInput!, radius: Float, unit: String): [DropLocation]

  """Get available pickup windows for an address."""
  getPickupWindows(address: AddressInput!, serviceDate: Date): PickupCreation

  """Get all QuantumView subscriptions for the account."""
  listQuantumViewSubscriptions: [QVSubscription]
}

type Mutation {
  """Create a new shipment and generate labels."""
  createShipment(request: ShipmentRequest!): ShipmentResponse

  """Void (cancel) a shipment."""
  voidShipment(shipmentIdentificationNumber: String!, trackingNumbers: [String]): VoidShipment

  """Schedule a package pickup."""
  createPickup(
    shipperNumber: String!
    serviceDate: Date!
    readyByTime: String!
    closeTime: String!
    address: AddressInput!
    packages: [PackageInput]
  ): PickupCreation

  """Cancel a scheduled pickup."""
  cancelPickup(confirmationNumber: String!, shipperNumber: String!): Boolean

  """Create a freight (LTL) shipment."""
  createFreightShipment(
    shipper: ShipFromInput!
    shipTo: ShipToInput!
    service: String!
    commodities: [PackageInput!]!
    pickupDate: Date
  ): FreightShipment

  """Schedule a freight pickup."""
  createFreightPickup(
    shipperAccountNumber: String!
    pickupDate: Date!
    readyTime: String!
    closeTime: String!
    address: AddressInput!
  ): FreightPickup

  """Create or update a QuantumView subscription."""
  subscribeQuantumView(
    name: String!
    fileType: QVSubscriptionFileType!
    beginDate: Date
    endDate: Date
    emailAddress: String
  ): QVSubscription

  """Register a webhook endpoint for event notifications."""
  registerWebhook(url: String!, events: [String!]!): Webhook

  """Delete a registered webhook."""
  deleteWebhook(webhookId: String!): Boolean

  """Submit end-of-day manifest."""
  submitManifest(request: ManifestRequest!): ManifestResponse
}
